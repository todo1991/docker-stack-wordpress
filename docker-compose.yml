---
# ---- shared defaults -------------------------------------------------------

# cap json-file logs so container stdout/stderr can't fill the disk
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# applied to every service
x-hardening: &hardening
  logging: *default-logging
  security_opt:
    - no-new-privileges:true

# DB settings shared by wordpress_instance and wpcli
x-wordpress-env: &wordpress-env
  WORDPRESS_DB_HOST: mariadb
  WORDPRESS_DB_USER: ${MARIADB_USER}
  WORDPRESS_DB_NAME: ${MARIADB_DATABASE}
  WORDPRESS_DB_PASSWORD: ${MARIADB_PASSWORD}
  WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wpstack_}

x-db-depends: &db-depends
  mariadb:
    condition: service_healthy
  redis:
    condition: service_healthy

# fast checks while starting (start_interval), relaxed once steady
x-healthcheck-timing: &healthcheck-timing
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s
  start_interval: 5s

services:

  mariadb:
    # 10.11 is an LTS line; track the latest patch release instead of pinning one
    image: mariadb:10.11
    container_name: mariadb
    restart: unless-stopped
    # give the DB time to flush on shutdown (default 10s risks a SIGKILL mid-write)
    stop_grace_period: 1m
    <<: *hardening
    env_file:
      - .env
    healthcheck:
      # official healthcheck script shipped with the mariadb image
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      <<: *healthcheck-timing
    volumes:
      - type: volume
        source: mariadb
        target: /var/lib/mysql
      # whole directory so per-host overrides (zz-*.cnf, gitignored) load
      # after mariadbcustom.cnf and can override any default
      - type: bind
        source: ./conf/mariadb
        target: /etc/mysql/conf.d
        read_only: true
    networks:
      - wordpressnetworkstack

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    <<: *hardening
    command:
      - redis-server
      - --appendonly
      - "no"
      # pure cache: disable RDB snapshots too, no persistence needed
      - --save
      - ""
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    networks:
      - wordpressnetworkstack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck-timing

  nginx:
    build:
      context: ./dockerfile
      dockerfile: Dockerfile.alpine
      args:
        # modsecurity is built from OWASP sources in its own stage (no longer in pkg-oss)
        ENABLED_MODULES: >
          testcookie-nginx-module ngx_cache_purge brotli
    # prebuilt by CI; set UPDATE_BUILD=1 in update.sh to build locally instead
    image: ghcr.io/todo1991/nginx_wordpress_alpine
    container_name: nginx
    restart: unless-stopped
    <<: *hardening
    ports:
      - 80:80
      - 443:443
      # QUIC / HTTP-3
      - 443:443/udp
    volumes:
      # page cache lives in RAM; capped a bit above fastcgi_cache_path
      # max_size=1024m so the cache manager can trim before tmpfs fills
      - type: tmpfs
        target: /run/nginx-cache
        tmpfs:
          size: 1258291200
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
      # nginx only reads its config, certs and the docroot
      - type: bind
        source: ./conf/nginx/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
      - type: bind
        source: ./conf/nginx/conf.d
        target: /etc/nginx/conf.d
        read_only: true
      - type: bind
        source: ./logs
        target: /var/log/nginx
      - type: bind
        source: ./conf/nginx/modsec
        target: /etc/nginx/modsec
        read_only: true
      - type: volume
        source: certbot-ssl
        target: /etc/letsencrypt
        read_only: true
      # mount root document website fix 404, when use php-fpm (fastcgi_pass)
      - type: volume
        source: public_html
        target: /var/www/html
        read_only: true
    depends_on:
      wordpress_instance:
        condition: service_healthy
    networks:
      wordpressnetworkstack:
        # containers resolve the site domain straight to nginx, so WordPress
        # loopback requests (REST API / Site Health) work without extra_hosts
        aliases:
          - ${DOMAIN}
          - www.${DOMAIN}
    healthcheck:
      # stub_status is exposed on port 80 for 127.0.0.1 only (see the site config)
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx_status"]
      <<: *healthcheck-timing

  wordpress_instance:
    build:
      context: ./dockerfile
      dockerfile: Dockerfile.wp
      args:
        DOMAIN: ${DOMAIN}
    image: ghcr.io/todo1991/phpfpm_wordpress_alpine
    container_name: wordpress_instance
    restart: unless-stopped
    <<: *hardening
    environment:
      <<: *wordpress-env
      WORDPRESS_CONFIG_EXTRA: |
        # define('DISALLOW_FILE_EDIT', true);
        # enable if no plugin need edit file!
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_MEMORY_LIMIT', '256M');
        define('WP_MAX_MEMORY_LIMIT', '512M');
        # cron runs from the host via wp-cli (see init.sh), not on page views
        define('DISABLE_WP_CRON', true);
    volumes:
      - type: volume
        source: public_html
        target: /var/www/html
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
    depends_on: *db-depends
    networks:
      - wordpressnetworkstack
    healthcheck:
      # hit php-fpm's ping endpoint through FastCGI instead of just checking the process
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000"]
      <<: *healthcheck-timing

  # helper services: not started by `docker compose up -d`,
  # use `docker compose run --rm <service>` instead
  certbot:
    image: certbot/certbot
    container_name: certbot
    profiles:
      - tools
    init: true
    <<: *hardening
    dns:
      - 8.8.8.8
    volumes:
      - type: volume
        source: certbot-ssl
        target: /etc/letsencrypt
      - type: volume
        source: public_html
        target: /var/www/html
    networks:
      - wordpressnetworkstack

  wpcli:
    image: wordpress:cli
    container_name: wpcli
    profiles:
      - tools
    init: true
    <<: *hardening
    environment:
      <<: *wordpress-env
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_MEMORY_LIMIT', '256M');
        define('WP_MAX_MEMORY_LIMIT', '512M');
    volumes:
      - type: volume
        source: public_html
        target: /var/www/html
    depends_on: *db-depends
    networks:
      - wordpressnetworkstack

networks:
  wordpressnetworkstack:
    driver: bridge
    name: wordpressnetworkstack
    enable_ipv6: true

volumes:
  certbot-ssl:
    external: true
  public_html:
    external: true
  mariadb:
    external: true
